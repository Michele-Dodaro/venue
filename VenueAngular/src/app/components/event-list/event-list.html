<div class="container">
  
  <h2>Lista Eventi</h2>
  
  <ul class="event-list">
    @for (event of events; track event.id) {
      @if (event.active  || isLoggedIn()) {
        <li class="event-card" [class.inactive-event]="!event.active">
          <a [routerLink]="['/events', event.id]" style="display: block; text-decoration: none; color: inherit;">
            <h3>{{ event.name }}</h3>
            <p class="description">{{ event.description }}</p>
            <p class="description"><strong>Genere:</strong> {{ event.genre }}</p>
            <small>Data: {{ event.date | date:'dd/MM/yyyy HH:mm' }}</small>
          </a>
        </li>
      }
    } @empty {
      <li class="no-data" style="list-style: none;">Nessun evento trovato nel database.</li>
    }
  </ul>
</div>
