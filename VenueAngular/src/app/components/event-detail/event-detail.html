<div class="detail-container">
  <ng-container *ngIf="event; else loading">
    @if (event.image && event.image.trim() !== '') {
      <div class="event-image-hero">
        <img [src]="event.image" [alt]="event.name">
      </div>
    }
    
    <div class="event-hero" [class.inactive-event]="!event.active">
      <h2>{{ event.name }}</h2>
      <p class="date">Data: {{ event.date | date:'dd/MM/yyyy HH:mm' }}</p>
    </div>

    <div class="event-content">
      <section class="description-section">
        <h3>Descrizione</h3>
        <p>{{ event.description }}</p>
        <a [routerLink]="['/events', event.id, 'seats']" class="back-btn">Acquista Posto</a>

      </section>
      <section class="info-section">
        <h3>Genere</h3>
        <p>{{ event.genre }}</p>
      </section>
    </div>

    <div class="actions">
      <a routerLink="/events"><button class="back-btn">Torna alla lista</button></a>
      @if (isLoggedIn$ | async) {
        <a [routerLink]="['/events', event.id, 'edit']" class="edit-btn-link">
          <button class="edit-btn">Modifica Evento</button>
        </a>
        <button class="delete-btn" (click)="onDelete(event.id)">Elimina Evento</button>
      }
    </div>
  </ng-container>

  <ng-template #loading>
    <p>Caricamento evento in corso...</p>
  </ng-template>
</div>
