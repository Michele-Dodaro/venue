<div class="detail-container">
  <ng-container *ngIf="event; else loading">
    <div class="event-hero" [class.inactive-event]="!event.active">
      <h2>{{ event.name }}</h2>
      <p class="date">Data: {{ event.date | date:'dd/MM/yyyy HH:mm' }}</p>
    </div>

    <div class="event-content">
      <section class="description-section">
        <h3>Descrizione</h3>
        <p>{{ event.description }}</p>

        <ng-container *ngIf="isLoggedIn$ | async; else loginToBuy">
          <a [routerLink]="['/events', event.id, 'seats']" class="back-btn">acquista Posto</a>
        </ng-container>

        <ng-template #loginToBuy>
          <a routerLink="/login" [queryParams]="{ redirectTo: '/events/' + event.id + '/seats' }" class="back-btn">accedi per acquistare</a>
        </ng-template>

      </section>
      <section class="info-section">
        <h3>Genere</h3>
        <p>{{ event.genre }}</p>
      </section>
    </div>

    <div class="actions">
      <a routerLink="/events"><button class="back-btn">Torna alla lista</button></a>
      <button *ngIf="isLoggedIn$ | async" class="delete-btn" (click)="onDelete(event.id)">Elimina Evento</button>
    </div>
  </ng-container>

  <ng-template #loading>
    <p>Caricamento evento in corso...</p>
  </ng-template>
</div>
