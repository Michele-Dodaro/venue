<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All Events</title>
</head>
<body>
    <h1>All Events</h1>
    <ul id="events-list"></ul>

    <script>
        fetch('/api/events')
            .then(response => response.json())
            .then(data => {
                const eventsList = document.getElementById('events-list');
                data.forEach(event => {
                    const listItem = document.createElement('li');
                    listItem.textContent = `${event.name}: ${event.description} on ${new Date(event.date).toLocaleDateString()}`;
                    eventsList.appendChild(listItem);
                });
            });
    </script>
</body>
</html>
